<svg width="1180" height="270" viewBox="0 0 1180 270" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #030712;
      --border: rgba(255,255,255,0.09);
      --text: #F8FAFC;
      --muted: #94A3B8;
      --accent1: #7C3AED;
      --accent2: #22D3EE;
      --accent3: #10B981;
      --pillBg: rgba(255,255,255,0.05);
      --pillBorder: rgba(255,255,255,0.14);
      --pillHover: rgba(255,255,255,0.09);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #FFFFFF;
        --border: rgba(15,23,42,0.09);
        --text: #0F172A;
        --muted: #64748B;
        --accent1: #2563EB;
        --accent2: #06B6D4;
        --accent3: #10B981;
        --pillBg: rgba(15,23,42,0.035);
        --pillBorder: rgba(15,23,42,0.14);
        --pillHover: rgba(15,23,42,0.06);
      }
    }
    text { font-family: -apple-system, "Segoe UI", ui-sans-serif, Helvetica, Arial, sans-serif; }
    .mono { font-family: "SFMono-Regular", Consolas, Menlo, monospace; }
  </style>

  <defs>
    <linearGradient id="accentF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--accent1)"/>
      <stop offset="50%" stop-color="var(--accent2)"/>
      <stop offset="100%" stop-color="var(--accent3)"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glowF1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--accent1)" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="var(--accent1)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowF2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--accent3)" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="var(--accent3)" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cardClipF"><rect width="1180" height="270" rx="24"/></clipPath>
  </defs>

  <g clip-path="url(#cardClipF)">
    <rect width="1180" height="270" fill="var(--bg)"/>

    <circle cx="90" cy="230" r="200" fill="url(#glowF1)">
      <animate attributeName="cy" values="230;200;230" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1090" cy="40" r="220" fill="url(#glowF2)">
      <animate attributeName="cy" values="40;70;40" dur="11s" repeatCount="indefinite"/>
    </circle>

    <rect x="1.25" y="1.25" width="1177.5" height="267.5" rx="22.75" fill="none" stroke="url(#accentF)" stroke-opacity="0.55" stroke-width="1.5"/>

    <!-- eyebrow -->
    <g class="mono" font-size="12.5" fill="url(#accentF)" text-anchor="middle">
      <text x="590" y="52">&lt; LET'S BUILD SOMETHING GREAT /&gt;</text>
    </g>

    <text x="590" y="94" font-size="28" font-weight="700" fill="var(--text)" text-anchor="middle">Open to Frontend, BI &amp; ERP Opportunities</text>
    <text x="590" y="122" font-size="14" fill="var(--muted)" text-anchor="middle">Always glad to connect on new roles, internships, or collaborative projects.</text>

    <!-- social row -->
    <g transform="translate(590,196)">
      <!-- GitHub -->
      <g transform="translate(-330,0)">
        <circle r="28" fill="var(--pillBg)" stroke="var(--pillBorder)"/>
        <path d="M0-19c-10.5 0-19 8.5-19 19 0 8.4 5.5 15.5 13 18 1 .2 1.3-.4 1.3-1v-3.6c-5.3 1.1-6.4-2.5-6.4-2.5-.9-2.2-2.1-2.8-2.1-2.8-1.7-1.2.1-1.2.1-1.2 1.9.1 2.9 2 2.9 2 1.7 2.9 4.5 2.1 5.6 1.6.2-1.3.7-2.1 1.2-2.6-4.2-.5-8.6-2.1-8.6-9.3 0-2 .7-3.7 2-5-.2-.5-.9-2.5.2-5.2 0 0 1.6-.5 5.2 1.9 1.5-.4 3.1-.6 4.7-.6 1.6 0 3.2.2 4.7.6 3.6-2.4 5.2-1.9 5.2-1.9 1 2.7.4 4.7.2 5.2 1.3 1.4 2 3 2 5 0 7.2-4.4 8.8-8.6 9.3.7.6 1.3 1.8 1.3 3.6v5.3c0 .6.3 1.2 1.3 1 7.5-2.5 13-9.6 13-18 0-10.5-8.5-19-19-19z" fill="var(--text)"/>
        <text x="0" y="46" text-anchor="middle" font-size="12" fill="var(--muted)">GitHub</text>
        <text x="0" y="61" text-anchor="middle" font-size="10" class="mono" fill="var(--muted)">@youknowumer</text>
      </g>
      <!-- LinkedIn -->
      <g transform="translate(-110,0)">
        <circle r="28" fill="var(--pillBg)" stroke="var(--pillBorder)"/>
        <text x="0" y="7" text-anchor="middle" font-size="22" font-weight="700" fill="var(--text)">in</text>
        <text x="0" y="46" text-anchor="middle" font-size="12" fill="var(--muted)">LinkedIn</text>
        <text x="0" y="61" text-anchor="middle" font-size="10" class="mono" fill="var(--muted)">Connect</text>
      </g>
      <!-- Email -->
      <g transform="translate(110,0)">
        <circle r="28" fill="var(--pillBg)" stroke="var(--pillBorder)"/>
        <path d="M-13-8 0 3 13-8 M-13-9 h26 v16 h-26 z" stroke="var(--text)" stroke-width="1.6" fill="none" stroke-linejoin="round"/>
        <text x="0" y="46" text-anchor="middle" font-size="12" fill="var(--muted)">Email</text>
        <text x="0" y="61" text-anchor="middle" font-size="10" class="mono" fill="var(--muted)">Get in touch</text>
      </g>
      <!-- Resume -->
      <g transform="translate(330,0)">
        <circle r="28" fill="var(--pillBg)" stroke="var(--pillBorder)"/>
        <path d="M-9-14 h13 l5 5 v23 h-18 z" stroke="var(--text)" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <path d="M4-14 v5 h5" stroke="var(--text)" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <line x1="-5" y1="0" x2="7" y2="0" stroke="var(--text)" stroke-width="1.3"/>
        <line x1="-5" y1="6" x2="7" y2="6" stroke="var(--text)" stroke-width="1.3"/>
        <text x="0" y="46" text-anchor="middle" font-size="12" fill="var(--muted)">Resume</text>
        <text x="0" y="61" text-anchor="middle" font-size="10" class="mono" fill="var(--muted)">On request</text>
      </g>
    </g>
  </g>
</svg>
