<svg width="1180" height="112" viewBox="0 0 1180 112" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #030712;
      --border: rgba(255,255,255,0.09);
      --text: #F8FAFC;
      --accent1: #7C3AED;
      --accent2: #22D3EE;
      --accent3: #10B981;
      --pillBg: rgba(255,255,255,0.05);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #FFFFFF;
        --border: rgba(15,23,42,0.09);
        --text: #0F172A;
        --accent1: #2563EB;
        --accent2: #06B6D4;
        --accent3: #10B981;
        --pillBg: rgba(15,23,42,0.035);
      }
    }
  </style>

  <defs>
    <linearGradient id="accentFT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--accent1)"/>
      <stop offset="50%" stop-color="var(--accent2)"/>
      <stop offset="100%" stop-color="var(--accent3)"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glowFT" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--accent1)" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="var(--accent1)" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="topClip"><path d="M24,0 H1156 A24,24 0 0 1 1180,24 V112 H0 V24 A24,24 0 0 1 24,0 Z"/></clipPath>
  </defs>

  <g clip-path="url(#topClip)">
    <rect width="1180" height="112" fill="var(--bg)"/>
    <circle cx="590" cy="10" r="220" fill="url(#glowFT)">
      <animate attributeName="cx" values="590;660;590" dur="13s" repeatCount="indefinite"/>
    </circle>

    <path fill="var(--pillBg)" stroke="var(--border)" stroke-width="1">
      <animate attributeName="d" dur="10s" repeatCount="indefinite"
        values="
          M0,24 C 200,6 380,38 590,24 C 800,10 980,40 1180,22 L1180,0 L0,0 Z;
          M0,22 C 200,40 380,8 590,22 C 800,36 980,8 1180,24 L1180,0 L0,0 Z;
          M0,24 C 200,6 380,38 590,24 C 800,10 980,40 1180,22 L1180,0 L0,0 Z"/>
    </path>
    <path fill="none" stroke="url(#accentFT)" stroke-opacity="0.5" stroke-width="1.3">
      <animate attributeName="d" dur="10s" repeatCount="indefinite"
        values="
          M0,24 C 200,6 380,38 590,24 C 800,10 980,40 1180,22;
          M0,22 C 200,40 380,8 590,22 C 800,36 980,8 1180,24;
          M0,24 C 200,6 380,38 590,24 C 800,10 980,40 1180,22"/>
    </path>

    <!-- top + side border only, no bottom line so it seams cleanly -->
    <path d="M24,1.25 H1156 A22.75,22.75 0 0 1 1178.75,24 V112 M1.25,112 V24 A22.75,22.75 0 0 1 24,1.25"
      fill="none" stroke="url(#accentFT)" stroke-opacity="0.4" stroke-width="1.5"/>

    <text x="590" y="78" text-anchor="middle" font-size="15.5" font-style="italic" font-weight="500" fill="var(--text)">
      "Building thoughtful interfaces, one commit at a time."
    </text>
    <rect x="510" y="98" width="160" height="1.25" fill="url(#accentFT)" opacity="0.55"/>
  </g>
</svg>
