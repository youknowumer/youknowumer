<svg width="1180" height="190" viewBox="0 0 1180 190" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #030712;
      --border: rgba(255,255,255,0.09);
      --text: #F8FAFC;
      --muted: #94A3B8;
      --accent1: #7C3AED;
      --accent2: #22D3EE;
      --accent3: #10B981;
      --pillBg: rgba(255,255,255,0.05);
      --pillBorder: rgba(255,255,255,0.14);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #FFFFFF;
        --border: rgba(15,23,42,0.09);
        --text: #0F172A;
        --muted: #64748B;
        --accent1: #2563EB;
        --accent2: #06B6D4;
        --accent3: #10B981;
        --pillBg: rgba(15,23,42,0.035);
        --pillBorder: rgba(15,23,42,0.14);
      }
    }
    text { font-family: -apple-system, "Segoe UI", ui-sans-serif, Helvetica, Arial, sans-serif; }
    .mono { font-family: "SFMono-Regular", Consolas, Menlo, monospace; }
  </style>

  <defs>
    <linearGradient id="accentF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--accent1)"/>
      <stop offset="50%" stop-color="var(--accent2)"/>
      <stop offset="100%" stop-color="var(--accent3)"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glowF" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--accent1)" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="var(--accent1)" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="footerClip"><rect width="1180" height="190" rx="24"/></clipPath>
  </defs>

  <g clip-path="url(#footerClip)">
    <rect width="1180" height="190" fill="var(--bg)"/>

    <!-- ambient glow -->
    <circle cx="590" cy="200" r="260" fill="url(#glowF)">
      <animate attributeName="cx" values="590;650;590" dur="12s" repeatCount="indefinite"/>
    </circle>

    <!-- top wave -->
    <path fill="var(--pillBg)" stroke="var(--border)" stroke-width="1">
      <animate attributeName="d" dur="9s" repeatCount="indefinite"
        values="
          M0,26 C 180,4 320,44 590,26 C 860,8 1000,46 1180,24 L1180,0 L0,0 Z;
          M0,24 C 180,44 320,4 590,24 C 860,44 1000,6 1180,26 L1180,0 L0,0 Z;
          M0,26 C 180,4 320,44 590,26 C 860,8 1000,46 1180,24 L1180,0 L0,0 Z"/>
    </path>
    <path fill="none" stroke="url(#accentF)" stroke-opacity="0.55" stroke-width="1.4">
      <animate attributeName="d" dur="9s" repeatCount="indefinite"
        values="
          M0,26 C 180,4 320,44 590,26 C 860,8 1000,46 1180,24;
          M0,24 C 180,44 320,4 590,24 C 860,44 1000,6 1180,26;
          M0,26 C 180,4 320,44 590,26 C 860,8 1000,46 1180,24"/>
    </path>

    <!-- outer border -->
    <rect x="1.25" y="1.25" width="1177.5" height="187.5" rx="22.75" fill="none" stroke="url(#accentF)" stroke-opacity="0.45" stroke-width="1.5"/>

    <!-- quote -->
    <text x="590" y="86" text-anchor="middle" font-size="16" font-style="italic" fill="var(--text)">
      "Building thoughtful interfaces, one commit at a time."
    </text>

    <!-- divider -->
    <rect x="490" y="106" width="200" height="1.5" fill="url(#accentF)" opacity="0.6"/>

    <!-- signature row -->
<g class="mono" font-size="12.5" fill="var(--muted)">
  <text x="56" y="150">© 2026 Muhammad Umer Faheem</text>

  <text x="590" y="150" text-anchor="middle">
    Thanks for stopping by 👋
  </text>

  <text x="1124" y="150" text-anchor="end">
    <animate 
      attributeName="opacity" 
      values="1;0.35;1" 
      dur="1.8s" 
      repeatCount="indefinite"/>
    <animate 
      attributeName="fill" 
      values="#22c55e;#86efac;#22c55e" 
      dur="1.8s" 
      repeatCount="indefinite"/>
    ✨ Create Impact
  </text>
</g>
    </g>

    <!-- tiny pulse dot -->
    <circle cx="56" cy="170" r="3" fill="var(--accent3)">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="66" y="174" font-size="10.5" fill="var(--muted)" class="mono">Ambitious</text>
  </g>
</svg>
