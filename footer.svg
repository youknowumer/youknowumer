<svg width="1180" height="200" viewBox="0 0 1180 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    :root {
      --bg: #030712;
      --border: rgba(255,255,255,0.09);
      --text: #F8FAFC;
      --muted: #94A3B8;
      --accent1: #7C3AED;
      --accent2: #22D3EE;
      --accent3: #10B981;
      --pillBg: rgba(255,255,255,0.05);
      --pillBorder: rgba(255,255,255,0.14);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #FFFFFF;
        --border: rgba(15,23,42,0.09);
        --text: #0F172A;
        --muted: #64748B;
        --accent1: #2563EB;
        --accent2: #06B6D4;
        --accent3: #10B981;
        --pillBg: rgba(15,23,42,0.035);
        --pillBorder: rgba(15,23,42,0.14);
      }
    }
    text { font-family: -apple-system, "Segoe UI", ui-sans-serif, Helvetica, Arial, sans-serif; }
    .mono { font-family: "SFMono-Regular", Consolas, Menlo, monospace; }
  </style>

  <defs>
    <linearGradient id="accentF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--accent1)"/>
      <stop offset="50%" stop-color="var(--accent2)"/>
      <stop offset="100%" stop-color="var(--accent3)"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glowF" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--accent1)" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="var(--accent1)" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="footerClip"><rect width="1180" height="200" rx="24"/></clipPath>
  </defs>

  <g clip-path="url(#footerClip)">
    <rect width="1180" height="200" fill="var(--bg)"/>

    <!-- ambient glow -->
    <circle cx="590" cy="210" r="260" fill="url(#glowF)">
      <animate attributeName="cx" values="590;660;590" dur="13s" repeatCount="indefinite"/>
    </circle>

    <!-- top wave -->
    <path fill="var(--pillBg)" stroke="var(--border)" stroke-width="1">
      <animate attributeName="d" dur="10s" repeatCount="indefinite"
        values="
          M0,24 C 200,6 380,38 590,24 C 800,10 980,40 1180,22 L1180,0 L0,0 Z;
          M0,22 C 200,40 380,8 590,22 C 800,36 980,8 1180,24 L1180,0 L0,0 Z;
          M0,24 C 200,6 380,38 590,24 C 800,10 980,40 1180,22 L1180,0 L0,0 Z"/>
    </path>
    <path fill="none" stroke="url(#accentF)" stroke-opacity="0.5" stroke-width="1.3">
      <animate attributeName="d" dur="10s" repeatCount="indefinite"
        values="
          M0,24 C 200,6 380,38 590,24 C 800,10 980,40 1180,22;
          M0,22 C 200,40 380,8 590,22 C 800,36 980,8 1180,24;
          M0,24 C 200,6 380,38 590,24 C 800,10 980,40 1180,22"/>
    </path>

    <!-- outer border -->
    <rect x="1.25" y="1.25" width="1177.5" height="197.5" rx="22.75" fill="none" stroke="url(#accentF)" stroke-opacity="0.4" stroke-width="1.5"/>

    <!-- quote -->
    <text x="590" y="78" text-anchor="middle" font-size="15.5" font-style="italic" font-weight="500" fill="var(--text)">
      "Building thoughtful interfaces, one commit at a time."
    </text>

    <!-- divider -->
    <rect x="510" y="98" width="160" height="1.25" fill="url(#accentF)" opacity="0.55"/>

    <!-- social icons -->
    <g transform="translate(590,132)">
      <a href="https://github.com/youknowumer" xlink:href="https://github.com/youknowumer" target="_blank" rel="noopener">
        <g transform="translate(-64,0)">
          <circle r="16" fill="var(--pillBg)" stroke="var(--pillBorder)"/>
          <path d="M0-9c-5 0-9 4-9 9 0 4 2.6 7.4 6.2 8.6.5.1.6-.2.6-.5v-1.7c-2.5.5-3-1.2-3-1.2-.4-1-1-1.3-1-1.3-.8-.6.1-.6.1-.6.9.1 1.4.9 1.4.9.8 1.4 2.2 1 2.7.8.1-.6.3-1 .6-1.2-2-.2-4.1-1-4.1-4.4 0-1 .3-1.7.9-2.4-.1-.2-.4-1.2.1-2.5 0 0 .7-.2 2.4.9.7-.2 1.4-.3 2.1-.3.7 0 1.4.1 2.1.3 1.7-1.1 2.4-.9 2.4-.9.5 1.3.2 2.3.1 2.5.6.7.9 1.4.9 2.4 0 3.4-2.1 4.2-4.1 4.4.3.3.6.8.6 1.6v2.4c0 .3.1.6.6.5C7.4 7.4 10 4 10 0c0-5-4.5-9-10-9z" transform="translate(-1,0) scale(0.85)" fill="var(--text)"/>
        </g>
      </a>
      <a href="https://www.linkedin.com/in/youknowumer/" xlink:href="https://www.linkedin.com/in/youknowumer/" target="_blank" rel="noopener">
        <g>
          <circle r="16" fill="var(--pillBg)" stroke="var(--pillBorder)"/>
          <text text-anchor="middle" dy="4.5" font-size="12.5" font-weight="700" fill="var(--text)">in</text>
        </g>
      </a>
      <a href="mailto:umerfaheem632@gmail.com" xlink:href="mailto:umerfaheem632@gmail.com">
        <g transform="translate(64,0)">
          <circle r="16" fill="var(--pillBg)" stroke="var(--pillBorder)"/>
          <path d="M-8-3 0 2.5 8-3 M-8-3.5 h16 v8.5 h-16 z" stroke="var(--text)" stroke-width="1.3" fill="none"/>
        </g>
      </a>
    </g>

    <!-- signature row -->
    <g class="mono" font-size="12" fill="var(--muted)">
      <text x="590" y="176" text-anchor="middle">© 2026 Muhammad Umer Faheem</text>
    </g>
  </g>
</svg>
