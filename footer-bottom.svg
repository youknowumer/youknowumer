<svg width="1180" height="70" viewBox="0 0 1180 70" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg: #030712;
      --muted: #94A3B8;
      --accent1: #7C3AED;
      --accent2: #22D3EE;
      --accent3: #10B981;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #FFFFFF;
        --muted: #64748B;
        --accent1: #2563EB;
        --accent2: #06B6D4;
        --accent3: #10B981;
      }
    }
    .mono { font-family: "SFMono-Regular", Consolas, Menlo, monospace; }
  </style>

  <defs>
    <linearGradient id="accentFB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--accent1)"/>
      <stop offset="50%" stop-color="var(--accent2)"/>
      <stop offset="100%" stop-color="var(--accent3)"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;0%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="bottomClip"><path d="M0,0 H1180 V46 A24,24 0 0 1 1156,70 H24 A24,24 0 0 1 0,46 Z"/></clipPath>
  </defs>

  <g clip-path="url(#bottomClip)">
    <rect width="1180" height="70" fill="var(--bg)"/>
    <!-- bottom + side border only, no top line so it seams cleanly -->
    <path d="M1.25,0 V46 A22.75,22.75 0 0 0 24,68.75 H1156 A22.75,22.75 0 0 0 1178.75,46 V0"
      fill="none" stroke="url(#accentFB)" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="590" y="40" text-anchor="middle" class="mono" font-size="12" fill="var(--muted)">© 2026 Muhammad Umer Faheem</text>
  </g>
</svg>
